<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <g id="background">
    <rect x="0" y="0" width="512" height="512" rx="112" fill="#B5502D"/>
  </g>
  <g id="icon">
    <!-- thick ring with a gap, forming a geometric "C" -->
    <path d="M 336 160
             A 120 120 0 1 0 336 352"
          fill="none" stroke="#FBF2E4" stroke-width="46" stroke-linecap="round"/>
    <!-- small lime dot passing through the gap: exchange / currency in motion -->
    <circle cx="348" cy="256" r="30" fill="#F5CE6B"/>
  </g>
</svg>
